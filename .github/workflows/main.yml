name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install QA Dependencies
        run: |
          pip install -r qa/requirements.txt

      - name: Start Services (Docker Compose)
        run: |
          docker compose up -d --build
          # Wait for services to be healthy
          sleep 15 

      - name: Run E2E Tests (Logic Handshake)
        run: |
          echo "Running Selenium E2E suites to certify the Logic Handshake"
          pytest qa/tests/test_e2e.py -v

      - name: Stop Services
        if: always()
        run: docker compose down

      - name: Infocreon Quality Gate
        run: |
          echo "Passed Infocreon Quality Gate"
